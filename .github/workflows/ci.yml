name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: luarocks/gh-actions-lua@v10
        with:
          luaVersion: "luajit-2.1"
      - uses: hishamhm/gh-actions-luarocks@master
      - run: luarocks install luacheck
      - run: luacheck lua/ plugin/

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ plugin/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - run: |
          git clone --depth 1 https://github.com/echasnovski/mini.nvim \
            ~/.local/share/nvim/site/pack/deps/opt/mini.nvim
          git clone --depth 1 https://github.com/martintrojer/fugitive-core.nvim \
            ~/.local/share/nvim/site/pack/deps/start/fugitive-core.nvim
      - run: nvim --headless -u tests/init.lua
